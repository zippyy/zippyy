name: Update Latest Tech Relay Posts

on:
  workflow_dispatch:
  schedule:
    - cron: "47 5 * * *"
  push:
    paths:
      - ".github/workflows/blog-post-workflow.yml"

permissions:
  contents: write

concurrency:
  group: latest-tech-relay-posts
  cancel-in-progress: true

jobs:
  update-readme-with-blog:
    name: Update profile README with latest Tech Relay posts
    runs-on: ubuntu-latest

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Update latest blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://techrelay.xyz/index.xml"
          max_post_count: 5
          commit_message: "chore: update latest Tech Relay posts"
          committer_username: "github-actions[bot]"
          committer_email: "41898282+github-actions[bot]@users.noreply.github.com"
          enable_keepalive: false
          retry_count: 3
          retry_wait_time: 10
